# Twynt — Cloudflare Workers Configuration
#
# Drei Worker:
#   1. twynt-translate          → Edge-Worker, der HTML übersetzt (Routes vor /)
#   2. twynt-warmup             → Cron-Worker für Pre-Translation
#   3. twynt-translate (admin)  → optionaler Admin-Endpoint (siehe unten)
#
# Setup:
#   wrangler login
#   wrangler kv:namespace create "TRANSLATIONS"
#   wrangler kv:namespace create "TRANSLATIONS" --preview
#   wrangler kv:namespace create "WARMUP_CONFIG"
#   wrangler secret put DEEPL_API_KEY
#   wrangler secret put GOOGLE_TRANSLATE_API_KEY
#   wrangler secret put ADMIN_TOKEN
#
# Beachte: account_id und kv_namespace ids unten ersetzen mit echten Werten.

name = "twynt-translate"
main = "workers/translate.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
account_id = "477794df69f0b6a0b9e4c59e36883c1f"

# Routes: Worker greift auf alle HTML-Anfragen zu, die durch /<lang>/ kommen.
# In Produktion auf custom domain mounten:
#   routes = [
#     { pattern = "twynt.com/*", zone_name = "twynt.com" },
#     { pattern = "www.twynt.com/*", zone_name = "twynt.com" }
#   ]
[[routes]]
pattern = "twynt.com/*"
zone_name = "twynt.com"

# Variables (kein Secret) — Origin URL der Vite-PWA auf Cloudflare Pages
[vars]
ORIGIN_URL = "https://twynt-app.pages.dev"
CANONICAL_HOST = "https://twynt.com"

# KV Namespaces — IDs nach `wrangler kv:namespace create` ersetzen
[[kv_namespaces]]
binding = "TRANSLATIONS"
id = "d759942d22f64ae5ab9af0801bba78d9"
preview_id = "83c5d8584f2f45f5a217d7d72b7327a1"

# Observability
[observability]
enabled = true
head_sampling_rate = 1

# ---------------------------------------------------------------------------
# Warmup-Worker — separater Service mit Cron-Trigger
# Deploy mit:  wrangler deploy --config wrangler.warmup.toml
#
# Wir trennen die TOML-Konfiguration nicht physisch, sondern via Environment.
# Cloudflare-Wrangler unterstützt mehrere Environments in derselben TOML.
# ---------------------------------------------------------------------------

[env.warmup]
name = "twynt-warmup"
main = "workers/warmup-translations.ts"
account_id = "477794df69f0b6a0b9e4c59e36883c1f"

# Cron: alle 6 Stunden, plus täglich um 03:00 UTC für vollen Sweep
# (mehr Cron-Triggers = häufigere Frische, weniger = niedrigere API-Kosten)
[env.warmup.triggers]
crons = ["0 */6 * * *", "0 3 * * *"]

[env.warmup.vars]
ORIGIN_URL = "https://twynt-app.pages.dev"
CANONICAL_HOST = "https://twynt.com"

[[env.warmup.kv_namespaces]]
binding = "TRANSLATIONS"
id = "d759942d22f64ae5ab9af0801bba78d9"

[[env.warmup.kv_namespaces]]
binding = "WARMUP_CONFIG"
id = "334c6dca50634263b9d7f9aa8273388f"

# ---------------------------------------------------------------------------
# Auth-Worker — Google OAuth + Sessions
# Deploy mit: wrangler deploy --env auth
# ---------------------------------------------------------------------------

[env.auth]
name = "twynt-auth"
main = "workers/auth-google.ts"
account_id = "477794df69f0b6a0b9e4c59e36883c1f"

[[env.auth.routes]]
pattern = "twynt.com/auth/*"
zone_name = "twynt.com"

[env.auth.vars]
CANONICAL_HOST = "https://twynt.com"
ORIGIN_URL = "https://twynt-app.pages.dev"

[[env.auth.kv_namespaces]]
binding = "TRANSLATIONS"
id = "d759942d22f64ae5ab9af0801bba78d9"

[[env.auth.kv_namespaces]]
binding = "SESSIONS"
id = "d74ab18d7859464b92fc730bd453fcc6"

[[env.auth.kv_namespaces]]
binding = "OAUTH_STATE"
id = "bafc5fc93a504c9abf33af69601e31dc"

# ---------------------------------------------------------------------------
# Storage-Worker — IDrive E2 (Memory-Files)
# Deploy mit: wrangler deploy --env storage
# ---------------------------------------------------------------------------

[env.storage]
name = "twynt-storage"
main = "workers/storage-idrive.ts"
account_id = "477794df69f0b6a0b9e4c59e36883c1f"

[[env.storage.routes]]
pattern = "twynt.com/storage/*"
zone_name = "twynt.com"

[env.storage.vars]
CANONICAL_HOST = "https://twynt.com"
ORIGIN_URL = "https://twynt-app.pages.dev"
IDRIVE_E2_ENDPOINT = "https://b2x4.fra.idrivee2-31.com"
IDRIVE_E2_BUCKET = "twynt-memories"
IDRIVE_E2_REGION = "fra"

[[env.storage.kv_namespaces]]
binding = "TRANSLATIONS"
id = "d759942d22f64ae5ab9af0801bba78d9"

[[env.storage.kv_namespaces]]
binding = "SESSIONS"
id = "d74ab18d7859464b92fc730bd453fcc6"

[[env.storage.kv_namespaces]]
binding = "OAUTH_STATE"
id = "bafc5fc93a504c9abf33af69601e31dc"

# ---------------------------------------------------------------------------
# Secrets (per `wrangler secret put`):
#
# Translate + Warmup:
#   DEEPL_API_KEY                 → DeepL Pro Auth Key
#   GOOGLE_TRANSLATE_API_KEY      → Google Cloud Translation v2 API-Key
#   ADMIN_TOKEN                   → Bearer-Token für /warmup HTTP-Trigger
#
# Auth:
#   GOOGLE_OAUTH_CLIENT_ID        → aus GCP Console
#   GOOGLE_OAUTH_CLIENT_SECRET    → aus GCP Console
#   AUTH_HMAC_SECRET              → openssl rand -base64 48
#
# Storage:
#   IDRIVE_E2_ACCESS_KEY          → aus IDrive E2 Console
#   IDRIVE_E2_SECRET_KEY          → aus IDrive E2 Console
# ---------------------------------------------------------------------------
