SMYST_AI_MODEL_RAG = "pending-salad-rag"
SMYST_AI_STREAMING_ENABLED = "false"
SALAD_API_BASE_URL = "https://api.salad.com/api/public"
SALAD_ORGANIZATION_NAME = "smyst-com"
SALAD_PROJECT_NAME = "default"
SALAD_CONTAINER_GROUP = "smyst-compute-worker"
SALAD_CONTAINER_HEALTH_URL = "https://juniper-habanero-4boc33ingp3ltvsm.salad.cloud/health"

[[env.api.kv_namespaces]]
binding = "TRANSLATIONS"
id = "9790a73572ff4308aed92cb45879f81e"

[[env.api.kv_namespaces]]
binding = "SESSIONS"
id = "925ca987abb04ef0915bc8e24aea0588"

[[env.api.kv_namespaces]]
binding = "OAUTH_STATE"
id = "f8daec3641d04c51a4d3a441e5febd12"

[[env.api.kv_namespaces]]
binding = "METADATA"
id = "e85f2a9237b84cb2be1cb3518e56217c"

# ---------------------------------------------------------------------------
# Secrets (per `wrangler secret put`):
#
# Translate + Warmup:
#   ADMIN_TOKEN                   → Bearer-Token für /warmup HTTP-Trigger
#   Keine DeepL-/Google-Translate-Secrets in der Free-only-Phase.
#
# Auth:
#   GITHUB_OAUTH_CLIENT_ID        → aus GitHub OAuth App
#   GITHUB_OAUTH_CLIENT_SECRET    → aus GitHub OAuth App
#   AUTH_HMAC_SECRET              → openssl rand -base64 48
#   SMYST_ADMIN_TOTP_SECRETS      → per-admin TOTP map, z. B. email@example.com=BASE32
#   SMYST_ADMIN_TOTP_SECRET       → optionaler Single-Admin-Fallback, besser vermeiden
#
# Storage:
#   IDRIVE_E2_ACCESS_KEY          → aus IDrive E2 Console
#   IDRIVE_E2_SECRET_KEY          → aus IDrive E2 Console
#
# Salad Compute / AI:
#   SALAD_API_BASE_URL            → Salad API base URL
#   SALAD_ORGANIZATION_NAME       → Salad organization name
#   SALAD_PROJECT_NAME            → Salad project name
#   SALAD_CONTAINER_GROUP         → Salad container group for Smyst jobs
#   SALAD_CONTAINER_HEALTH_URL    → public health URL of the Salad runtime
#   SALAD_API_KEY                 → Salad API key
#   SMYST_COMPUTE_CALLBACK_SECRET → internal bearer secret for Salad job callbacks
# ---------------------------------------------------------------------------
