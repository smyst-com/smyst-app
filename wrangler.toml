# Smyst — Cloudflare Workers Configuration
#
# Free-only Worker-Konfiguration:
#   1. smyst-translate          → Edge-Worker, der HTML übersetzt (Routes vor /)
#   2. smyst-warmup             → derzeit nur Identity/No-op, keine externen APIs
#
# Setup:
#   wrangler login
#   wrangler kv:namespace create "TRANSLATIONS"
#   wrangler kv:namespace create "TRANSLATIONS" --preview
#   wrangler kv:namespace create "WARMUP_CONFIG"
#   wrangler secret put ADMIN_TOKEN
#
# Beachte: account_id und kv_namespace ids unten ersetzen mit echten Werten.

name = "smyst-translate"
main = "workers/translate.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
account_id = "186363805f9fc571fd16528a1ed7c52d"

# Routes: Worker greift auf alle HTML-Anfragen zu, die durch /<lang>/ kommen.
# In Produktion auf custom domain mounten:
#   routes = [
#     { pattern = "smyst.com/*", zone_name = "smyst.com" },
#     { pattern = "www.smyst.com/*", zone_name = "smyst.com" }
#   ]
[[routes]]
pattern = "smyst.com/*"
zone_name = "smyst.com"

# Variables (kein Secret) — Origin URL der Vite-PWA auf Cloudflare Pages
[vars]
ORIGIN_URL = "https://smyst-app-67m.pages.dev"
CANONICAL_HOST = "https://smyst.com"

# KV Namespaces — IDs nach `wrangler kv:namespace create` ersetzen
[[kv_namespaces]]
binding = "TRANSLATIONS"
id = "9790a73572ff4308aed92cb45879f81e"
preview_id = "eef0904c0e404ac3b1171aa4aa9be96d"

# Observability
[observability]
enabled = true
head_sampling_rate = 1

# ---------------------------------------------------------------------------
# Warmup-Worker — separater Service mit Cron-Trigger
# Deploy mit:  wrangler deploy --config wrangler.warmup.toml
#
# Wir trennen die TOML-Konfiguration nicht physisch, sondern via Environment.
# Cloudflare-Wrangler unterstützt mehrere Environments in derselben TOML.
# ---------------------------------------------------------------------------

[env.warmup]
name = "smyst-warmup"
main = "workers/warmup-translations.ts"
account_id = "186363805f9fc571fd16528a1ed7c52d"
routes = []
workers_dev = true

# Cron: sparsam halten, damit Cloudflare-Free-Limits geschont werden.
[env.warmup.triggers]
crons = ["0 3 * * SUN"]

[env.warmup.vars]
ORIGIN_URL = "https://smyst-app-67m.pages.dev"
CANONICAL_HOST = "https://smyst.com"

[[env.warmup.kv_namespaces]]
binding = "TRANSLATIONS"
id = "9790a73572ff4308aed92cb45879f81e"

[[env.warmup.kv_namespaces]]
binding = "WARMUP_CONFIG"
id = "08b7e5bf71b040e0843ed113b5f727f4"

# ---------------------------------------------------------------------------
# Auth-Worker — GitHub OAuth + Sessions
# Deploy mit: wrangler deploy --env auth
# ---------------------------------------------------------------------------

[env.auth]
name = "smyst-auth"
main = "workers/auth-github.ts"
account_id = "186363805f9fc571fd16528a1ed7c52d"

[[env.auth.routes]]
pattern = "smyst.com/auth/*"
zone_name = "smyst.com"

[env.auth.vars]
CANONICAL_HOST = "https://smyst.com"
ORIGIN_URL = "https://smyst-app-67m.pages.dev"
SMYST_OWNER_GITHUB_IDS = "284471437"
SMYST_OWNER_EMAILS = "smyst247@gmail.com"
SMYST_ADMIN_GITHUB_IDS = ""
SMYST_ADMIN_EMAILS = ""

[[env.auth.kv_namespaces]]
binding = "TRANSLATIONS"
id = "9790a73572ff4308aed92cb45879f81e"

[[env.auth.kv_namespaces]]
binding = "SESSIONS"
id = "925ca987abb04ef0915bc8e24aea0588"

[[env.auth.kv_namespaces]]
binding = "OAUTH_STATE"
id = "f8daec3641d04c51a4d3a441e5febd12"

