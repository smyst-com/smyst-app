# ---------------------------------------------------------------------------
# API-Worker — Free-only Chat/API
# Deploy mit: wrangler deploy --env api
# ---------------------------------------------------------------------------

[env.api]
name = "smyst-api"
main = "workers/api.ts"
account_id = "186363805f9fc571fd16528a1ed7c52d"

[[env.api.routes]]
pattern = "smyst.com/api/*"
zone_name = "smyst.com"

[[env.api.routes]]
pattern = "www.smyst.com/api/*"
zone_name = "smyst.com"

[[env.api.routes]]
pattern = "app.smyst.com/api/*"
zone_name = "smyst.com"

[[env.api.routes]]
pattern = "api.smyst.com/*"
zone_name = "smyst.com"

[env.api.vars]
