name: Pipeline Run (historische Profile)

# Fuehrt die smyst.com Autopilot-Pipeline aus — mit echten Credentials
# (IDrive e2 + LLM-Provider aus den Repo-Secrets) und echtem Netz.
#
# mode=dry-run   : nichts wird gespeichert; validiert SPARQL, APIs, e2-Zugriff.
# mode=run-small : echter Kettenlauf mit kleinen Limits — Kandidaten landen in
#                  IDrive e2 unter pipeline/. KEIN Publish: Veroeffentlichen
#                  bleibt eine menschliche Handlung (publish_profiles CLI).
# mode=run-batch : wie run-small, aber mit batch_limit je Worker-Stufe —
#                  fuer das Abarbeiten kuratierter Seeds (laengeres Timeout).
# mode=seed      : kuratierte Kandidaten aus smyst_179_candidates.json einspielen.

on:
  # Taeglicher Automatik-Lauf 01:23 UTC = 03:23 Europe/Berlin (Sommerzeit).
    # Off-Peak-Minute statt 04:00 UTC: GitHub verzoegert Crons zur vollen Stunde um 2-4 h.
    # Cron laeuft immer als run-small (Ingest bis QA). Publish siehe Auto-Publish.
  schedule:
    - cron: "23 1 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run | run-small | run-batch | seed | status | publish-reviewed | unpublish | backfill-gender"
        required: true
        default: "dry-run"
        type: choice
        options: [dry-run, run-small, run-batch, seed, status, publish-reviewed, unpublish, backfill-gender]
      approved_by:
        description: "Freigabe-E-Mail (nur fuer publish-reviewed; wird im Audit-Trail dokumentiert)"
        required: false
        # Admin-/Freigabe-E-Mail als Standard (schriftliche Anweisung Adam King, 17.07.2026)
        default: "smyst247@gmail.com"
      qids:
        description: "Optional (publish-reviewed/unpublish): kommagetrennte QIDs — publiziert bzw. unpublisht NUR diese Profile"
        required: false
        default: ""
      reason:
        description: "Begruendung (nur fuer unpublish; wird im Audit-Trail dokumentiert)"
        required: false
        default: ""
      batch_limit:
        description: "Kandidaten je Worker-Stufe (nur run-batch; kuratierte Seeds abarbeiten)"
        required: false
        default: "45"
      publish_limit:
        description: "Optional (publish-reviewed): Tageslimit-Override fuer dokumentierte Sonderfreigaben"
        required: false
        default: ""
      backfill_dry_run:
        description: "backfill-gender: 'true' = nur Vorschau (Standard, schreibt nichts), 'false' = echter Schreiblauf"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

concurrency:
  group: pipeline-run
  cancel-in-progress: false

jobs:
  pipeline:
    name: Worker-Kette (${{ inputs.mode }})
    runs-on: ubuntu-latest
    # run-batch verarbeitet kuratierte Seeds in groesseren Stapeln und darf laenger laufen.
    timeout-minutes: 350
    permissions:
      contents: read
      actions: write
    defaults:
      run:
        working-directory: backend
    env:
      MODE: ${{ inputs.mode || 'run-small' }}
      BATCH_LIMIT: ${{ inputs.batch_limit || '45' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend (inkl. Test-Extras)
        run: pip install -e ".[dev]"

      # BEWUSST ohne Provider-Secrets: die Bestands-Tests erwarten den
      # deterministischen local-Provider; echte Keys wuerden echte API-Calls
      # ausloesen und die Assertions brechen.
      - name: Unit-Tests (komplette Pipeline-Suite, ohne Provider-Keys)
        run: python -m pytest tests/ -q

      - name: "Gender-Backfill (Bestandsprofile, Wikidata P21 aus Snapshots)"
        if: env.MODE == 'backfill-gender'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        # Standard ist Vorschau (--dry-run): schreibt nichts, zeigt nur, was
        # sich aendern wuerde. Echter Schreiblauf nur mit backfill_dry_run=false.
        run: |
          if [ "${{ inputs.backfill_dry_run }}" = "false" ]; then
            python -m app.workers.backfill_gender
          else
            python -m app.workers.backfill_gender --dry-run
          fi

      - name: "Status-Report (read-only)"
        if: env.MODE == 'status'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: python -m app.workers.report_status

      - name: "Publish (nur mit dokumentierter Freigabe)"
        if: env.MODE == 'publish-reviewed'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: |
          if [ -z "${{ inputs.approved_by }}" ]; then
            echo "publish-reviewed erfordert approved_by (Freigabe-E-Mail)."; exit 2
          fi
          LIMIT_ARGS=""
          if [ -n "${{ inputs.publish_limit }}" ]; then
            LIMIT_ARGS="--daily-limit ${{ inputs.publish_limit }}"
          fi
          if [ -n "${{ inputs.qids }}" ]; then
            for qid in $(echo "${{ inputs.qids }}" | tr ',' ' '); do
              python -m app.workers.publish_profiles publish --qid "$qid" \
                --approved-by "${{ inputs.approved_by }}" --enabled $LIMIT_ARGS
            done
          else
            python -m app.workers.publish_profiles publish --all-reviewed \
              --approved-by "${{ inputs.approved_by }}" --enabled $LIMIT_ARGS
          fi

      - name: "Seed: kuratierte Kandidaten einspielen (smyst_179_candidates.json)"
        if: env.MODE == 'seed'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: python -m app.workers.seed_candidates --file ../smyst_179_candidates.json --enabled

      - name: "Worker 1: Wikidata-Ingest"
        if: env.MODE == 'dry-run' || env.MODE == 'run-small'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: |
          if [ "$MODE" = "run-small" ]; then
            python -m app.workers.ingest_candidates --enabled --limit 120
          else
            python -m app.workers.ingest_candidates --dry-run --category Wissenschaft
          fi

      - name: "Worker 2: Research"
        if: env.MODE == 'dry-run' || env.MODE == 'run-small' || env.MODE == 'run-batch'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: |
          if [ "$MODE" = "run-batch" ]; then
            python -m app.workers.research_candidates --enabled --limit "$BATCH_LIMIT"
          elif [ "$MODE" = "run-small" ]; then
            python -m app.workers.research_candidates --enabled --limit 120
          else
            python -m app.workers.research_candidates --dry-run --limit 3
          fi

      - name: "Worker 3: Risiko-Check"
        if: env.MODE == 'dry-run' || env.MODE == 'run-small' || env.MODE == 'run-batch'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: |
          if [ "$MODE" = "run-batch" ]; then
            python -m app.workers.assess_risk --enabled --limit "$BATCH_LIMIT"
          elif [ "$MODE" = "run-small" ]; then
            python -m app.workers.assess_risk --enabled --limit 120
          else
            python -m app.workers.assess_risk --dry-run --limit 3
          fi

      - name: "Worker 4: Twin-Capsule-Build"
        if: env.MODE == 'dry-run' || env.MODE == 'run-small' || env.MODE == 'run-batch'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: |
          if [ "$MODE" = "run-batch" ]; then
            python -m app.workers.build_capsules --enabled --limit "$BATCH_LIMIT"
          elif [ "$MODE" = "run-small" ]; then
            python -m app.workers.build_capsules --enabled --limit 120
          else
            python -m app.workers.build_capsules --dry-run --limit 3
          fi

      - name: "Worker 5: QA (inkl. Chat-Smoke-Test)"
        if: env.MODE == 'dry-run' || env.MODE == 'run-small' || env.MODE == 'run-batch'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          # Runde 41: OpenRouter/OpenAI ergaenzt — Live-Ping bestaetigt beide
          # funktionsfaehig; sie fehlten dem QA-Lauf bisher, wodurch Groq-429
          # direkt in den degradierten Not-Fallback fuehrte.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # BEWUSST fest verdrahtet (Runde 40/41): exakt die Provider, deren
          # Keys oben uebergeben werden — Reihenfolge nach Live-Ping-Latenz.
          LLM_PROVIDER_ORDER: "groq,openrouter,openai,mistral,together,cohere,perplexity,zhipu,dashscope"
          LLM_DEFAULT_MODELS: ${{ secrets.LLM_DEFAULT_MODELS }}
        run: |
          if [ "$MODE" = "run-batch" ]; then
            python -m app.workers.qa_candidates --enabled --limit "$BATCH_LIMIT"
          elif [ "$MODE" = "run-small" ]; then
            python -m app.workers.qa_candidates --enabled --limit 120
          else
            python -m app.workers.qa_candidates --dry-run --limit 3
          fi

      # Unpublish entzieht nur die Sichtbarkeit (kein Loeschen, Master Prompt).
      - name: "Unpublish (nur mit dokumentierter Freigabe)"
        if: env.MODE == 'unpublish'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: |
          if [ -z "${{ inputs.approved_by }}" ] || [ -z "${{ inputs.qids }}" ] || [ -z "${{ inputs.reason }}" ]; then
            echo "unpublish erfordert approved_by, qids und reason."; exit 2
          fi
          for qid in $(echo "${{ inputs.qids }}" | tr ',' ' '); do
            python -m app.workers.publish_profiles unpublish --qid "$qid" \
              --reason "${{ inputs.reason }}" \
              --approved-by "${{ inputs.approved_by }}" --enabled
          done

      # Dauerhafte schriftliche Pauschal-Freigabe von Adam King (04.07.2026,
      # erweitert 18.07.2026: Tageslimit 100/Tag (schriftliche Freigabe Adam King)
      # / 10 Milliarden, explizite Anweisung Adam King):
      # der naechtliche Cron publiziert ALLE reviewed-Profile mit bestandener QA
      # automatisch. Bestehende Schutzmechanismen bleiben aktiv: nur
      # reviewed+qa_passed, Duplikat-Schutz gegen kuratierte Live-Profile,
      # Audit-Trail mit approved_by. Kein Loeschen.
      - name: "Auto-Publish (nur Cron; Pauschal-Freigabe Adam King 2026-07-04/17)"
        if: github.event_name == 'schedule'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: |
          python -m app.workers.publish_profiles publish --all-reviewed \
            --approved-by "smyst247@gmail.com" --enabled --daily-limit 100

      - name: "Auto-Deploy nach Publish (nur Cron)"
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run github-pages.yml --ref main --repo "$GITHUB_REPOSITORY"

      - name: Hinweis Publish
        if: env.MODE == 'dry-run' || (env.MODE == 'run-small' && github.event_name != 'schedule') || env.MODE == 'run-batch'
        run: |
          echo "Kein automatischer Publish. Freigabe durch Menschen:"
          echo "python -m app.workers.publish_profiles publish --qid <QID> --approved-by <email> --enabled"
