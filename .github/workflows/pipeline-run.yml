name: Pipeline Run (historische Profile)

# Fuehrt die smyst.com Autopilot-Pipeline aus — mit echten Credentials
# (IDrive e2 + LLM-Provider aus den Repo-Secrets) und echtem Netz.
#
# mode=dry-run   : nichts wird gespeichert; validiert SPARQL, APIs, e2-Zugriff.
# mode=run-small : echter Kettenlauf mit kleinen Limits — Kandidaten landen in
#                  IDrive e2 unter pipeline/. KEIN Publish: Veroeffentlichen
#                  bleibt eine menschliche Handlung (publish_profiles CLI).

on:
  # Taeglicher Automatik-Lauf 04:00 UTC = 06:00 Europe/Berlin (Sommerzeit).
  # Cron laeuft immer als run-small (Ingest bis QA). Publish bleibt manuell.
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run | run-small | status | publish-reviewed"
        required: true
        default: "dry-run"
        type: choice
        options: [dry-run, run-small, status, publish-reviewed]
      approved_by:
        description: "Freigabe-E-Mail (nur fuer publish-reviewed; wird im Audit-Trail dokumentiert)"
        required: false
        default: ""

concurrency:
  group: pipeline-run
  cancel-in-progress: false

jobs:
  pipeline:
    name: Worker-Kette (${{ inputs.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    env:
      MODE: ${{ inputs.mode || 'run-small' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend (inkl. Test-Extras)
        run: pip install -e ".[dev]"

      # BEWUSST ohne Provider-Secrets: die Bestands-Tests erwarten den
      # deterministischen local-Provider; echte Keys wuerden echte API-Calls
      # ausloesen und die Assertions brechen.
      - name: Unit-Tests (komplette Pipeline-Suite, ohne Provider-Keys)
        run: python -m pytest tests/ -q

      - name: "Status-Report (read-only)"
        if: env.MODE == 'status'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: python -m app.workers.report_status

      - name: "Publish (nur mit dokumentierter Freigabe)"
        if: env.MODE == 'publish-reviewed'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: |
          if [ -z "${{ inputs.approved_by }}" ]; then
            echo "publish-reviewed erfordert approved_by (Freigabe-E-Mail)."; exit 2
          fi
          python -m app.workers.publish_profiles publish --all-reviewed \
            --approved-by "${{ inputs.approved_by }}" --enabled

      - name: "Worker 1: Wikidata-Ingest"
        if: env.MODE == 'dry-run' || env.MODE == 'run-small'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: |
          if [ "$MODE" = "run-small" ]; then
            python -m app.workers.ingest_candidates --enabled
          else
            python -m app.workers.ingest_candidates --dry-run --category Wissenschaft
          fi

      - name: "Worker 2: Research"
        if: env.MODE == 'dry-run' || env.MODE == 'run-small'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: |
          if [ "$MODE" = "run-small" ]; then
            python -m app.workers.research_candidates --enabled --limit 5
          else
            python -m app.workers.research_candidates --dry-run --limit 3
          fi

      - name: "Worker 3: Risiko-Check"
        if: env.MODE == 'dry-run' || env.MODE == 'run-small'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: |
          if [ "$MODE" = "run-small" ]; then
            python -m app.workers.assess_risk --enabled --limit 5
          else
            python -m app.workers.assess_risk --dry-run --limit 3
          fi

      - name: "Worker 4: Twin-Capsule-Build"
        if: env.MODE == 'dry-run' || env.MODE == 'run-small'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: |
          if [ "$MODE" = "run-small" ]; then
            python -m app.workers.build_capsules --enabled --limit 5
          else
            python -m app.workers.build_capsules --dry-run --limit 3
          fi

      - name: "Worker 5: QA (inkl. Chat-Smoke-Test)"
        if: env.MODE == 'dry-run' || env.MODE == 'run-small'
        env:
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          LLM_PROVIDER_ORDER: ${{ secrets.LLM_PROVIDER_ORDER }}
          LLM_DEFAULT_MODELS: ${{ secrets.LLM_DEFAULT_MODELS }}
        run: |
          if [ "$MODE" = "run-small" ]; then
            python -m app.workers.qa_candidates --enabled --limit 5
          else
            python -m app.workers.qa_candidates --dry-run --limit 3
          fi

      - name: Hinweis Publish
        if: env.MODE == 'dry-run' || env.MODE == 'run-small'
        run: |
          echo "Kein automatischer Publish. Freigabe durch Menschen:"
          echo "python -m app.workers.publish_profiles publish --qid <QID> --approved-by <email> --enabled"
