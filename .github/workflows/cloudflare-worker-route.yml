name: Cloudflare Worker Route api
on:
  workflow_dispatch:
    inputs:
      do_delete:
        description: yes to delete matching routes
        required: true
        default: "no"
jobs:
  routes:
    runs-on: ubuntu-latest
    steps:
      - name: List and optionally delete worker routes for api.smyst.com
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE: df5ecb63a31ec80ac5eb8c74d2703bd4
          DODEL: ${{ inputs.do_delete }}
        run: |
          set -e
          API=https://api.cloudflare.com/client/v4
          ALL=$(curl -s "$API/zones/$ZONE/workers/routes" -H "Authorization: Bearer $TOKEN")
          echo "$ALL" | jq .
          MATCH=api.smyst.com
          echo Matching routes:
          echo "$ALL" | jq -r --arg m "$MATCH" '.result[]? | select(.pattern|contains($m)) | .id + "  " + .pattern'
          if [ "$DODEL" = "yes" ]; then
            for id in $(echo "$ALL" | jq -r --arg m "$MATCH" '.result[]? | select(.pattern|contains($m)) | .id'); do
              echo Deleting $id
              curl -s -X DELETE "$API/zones/$ZONE/workers/routes/$id" -H "Authorization: Bearer $TOKEN" | jq .
            done
          fi
