# Twynt — Auto-Deploy bei Push auf main
#
# Was passiert:
#   1. Jeder PR + jeder Push auf main triggert "ci"-Job: Install + Type-Check + Build
#   2. Push auf main triggert zusätzlich:
#      - "deploy-pages": Frontend nach Cloudflare Pages
#      - "deploy-workers": Translate + Auth + Warmup Worker
#      - "deploy-storage": IDrive E2 / R2 Storage Worker (sobald gebaut)
#
# Erforderliche GitHub-Secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN          — Wrangler-Token mit Pages + Workers + KV write
#                                   Erstellen unter dash.cloudflare.com/profile/api-tokens
#                                   Template "Edit Cloudflare Workers" wählen
#   CLOUDFLARE_ACCOUNT_ID         — 477794df69f0b6a0b9e4c59e36883c1f
#   VITE_GA_MEASUREMENT_ID        — G-XXXXXXXXXX (aus GA4)
#   VITE_GSC_VERIFICATION         — Google Search Console verification hash
#   VITE_CANONICAL_HOST           — https://twynt.com (optional, hat Default)

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manuelles Trigger für Notfall-Deploys
  workflow_dispatch:

# Vermeide parallele Deploys, queuen wenn nötig
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------- Stage 1: Continuous Integration ----------
  ci:
    name: CI — Install, Type-Check, Build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint:tsc
        continue-on-error: false

      - name: Build frontend
        run: npm run build
        env:
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
          VITE_GSC_VERIFICATION: ${{ secrets.VITE_GSC_VERIFICATION }}
          VITE_CANONICAL_HOST: ${{ vars.VITE_CANONICAL_HOST || 'https://twynt.com' }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 3

  # ---------- Stage 2: Deploy Pages ----------
  deploy-pages:
    name: Deploy Cloudflare Pages
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=twynt-app --branch=main

  # ---------- Stage 3: Deploy Workers ----------
  deploy-workers:
    name: Deploy Cloudflare Workers
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        worker:
          - { name: 'translate', env: '' }
          - { name: 'warmup',    env: 'warmup' }
          - { name: 'auth',      env: 'auth' }
          - { name: 'storage',   env: 'storage' }
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker (${{ matrix.worker.name }})
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: ${{ matrix.worker.env != '' && format('deploy --env {0}', matrix.worker.env) || 'deploy' }}

  # ---------- Stage 4: Sitemap-Ping an Google ----------
  ping-sitemap:
    name: Notify Search Engines
    needs: deploy-pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Google
        run: |
          curl -s -o /dev/null -w "Google: %{http_code}\n" \
            "https://www.google.com/ping?sitemap=https://twynt.com/sitemap.xml" || true

      - name: Ping Bing (IndexNow)
        run: |
          curl -s -o /dev/null -w "Bing: %{http_code}\n" \
            "https://www.bing.com/ping?sitemap=https://twynt.com/sitemap.xml" || true
