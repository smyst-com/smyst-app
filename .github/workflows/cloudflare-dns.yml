name: Cloudflare DNS
on:
  workflow_dispatch:
    inputs:
      target:
        description: "CNAME target host for api.smyst.com (e.g. xxx.salad.cloud)"
        required: true
        type: string
jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - name: Upsert proxied CNAME api.smyst.com
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          NAME="api.smyst.com"
          ROOT="smyst.com"
          echo "Token length: ${#CF_TOKEN}"
          echo "=== Accessible zones ==="
          curl -s -X GET "https://api.cloudflare.com/client/v4/zones?per_page=50" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" | jq '{success, errors, zones: [.result[] | {name, id}]}'
          echo "=== Resolve zone for $ROOT ==="
          ZRESP=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=$ROOT" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json")
          echo "$ZRESP" | jq '{success, errors, result: [.result[] | {name, id}]}'
          ZONE=$(echo "$ZRESP" | jq -r '.result[0].id // empty')
          if [ -z "$ZONE" ]; then
            echo "ERROR: Token cannot resolve zone for $ROOT. Token lacks access to this zone. Aborting."
            exit 1
          fi
          echo "Using zone $ZONE"
          API="https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records"
          BODY=$(printf '{"type":"CNAME","name":"%s","content":"%s","proxied":true,"ttl":1}' "$NAME" "$TARGET")
          REC=$(curl -s -X GET "$API?type=CNAME&name=$NAME" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json")
          ID=$(echo "$REC" | jq -r '.result[0].id // empty')
          if [ -n "$ID" ]; then
            echo "=== Patch $ID ==="
            curl -s -X PATCH "$API/$ID" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" --data "$BODY" | jq '{success, errors, name: .result.name, content: .result.content, proxied: .result.proxied}'
          else
            echo "=== Create ==="
            curl -s -X POST "$API" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" --data "$BODY" | jq '{success, errors, name: .result.name, content: .result.content, proxied: .result.proxied}'
          fi
