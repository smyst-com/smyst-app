name: Cloudflare DNS
on:
  workflow_dispatch:
    inputs:
      target:
        description: "CNAME target host for api.smyst.com (e.g. xxx.salad.cloud)"
        required: true
        type: string
jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - name: Upsert proxied CNAME api.smyst.com
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          NAME="api.smyst.com"
          ROOT="smyst.com"
          ZRESP=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=$ROOT" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json")
          ZONE=$(echo "$ZRESP" | jq -r '.result[0].id // empty')
          if [ -z "$ZONE" ]; then
            echo "ERROR: cannot resolve zone for $ROOT"; echo "$ZRESP" | jq '.errors'; exit 1
          fi
          echo "Using zone $ZONE"
          API="https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records"
          BODY=$(printf '{"type":"CNAME","name":"%s","content":"%s","proxied":true,"ttl":1}' "$NAME" "$TARGET")
          echo "=== GET dns_records (read test) ==="
          GETCODE=$(curl -s -o /tmp/rec.json -w "%{http_code}" -X GET "$API?type=CNAME&name=$NAME" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json")
          echo "HTTP $GETCODE"
          jq '{success, errors, count: (.result | length)}' /tmp/rec.json || cat /tmp/rec.json
          ID=$(jq -r '.result[0].id // empty' /tmp/rec.json 2>/dev/null || true)
          if [ -n "$ID" ]; then
            echo "=== PATCH $ID ==="
            PCODE=$(curl -s -o /tmp/out.json -w "%{http_code}" -X PATCH "$API/$ID" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" --data "$BODY")
          else
            echo "=== POST (create) ==="
            PCODE=$(curl -s -o /tmp/out.json -w "%{http_code}" -X POST "$API" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" --data "$BODY")
          fi
          echo "HTTP $PCODE"
          jq '{success, errors, name: .result.name, content: .result.content, proxied: .result.proxied}' /tmp/out.json || cat /tmp/out.json
          jq -e '.success == true' /tmp/out.json >/dev/null
