name: Foundation CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: foundation-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  free-only-policy:
    name: Free-only production policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Generate static sitemap
        run: node scripts/generate-sitemap.mjs

      - name: Validate free-only production surface
        run: python3 scripts/validate-foundation.py

  root-app:
    name: Root app type-check and build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint:tsc

      - name: Build Cloudflare Pages artifact
        run: npm run build

      - name: Validate Cloudflare Pages artifact
        run: sh scripts/check-dist-artifact.sh
