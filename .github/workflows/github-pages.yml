name: GitHub Pages Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_CANONICAL_HOST: https://smyst.com
          VITE_API_BASE_URL: https://api.smyst.com
          VITE_API_FALLBACK_BASE_URL: https://cherry-asparagus-a32jleuk8dgn22zu.salad.cloud
          VITE_AUTH_BASE_URL: https://api.smyst.com/auth
          VITE_AUTH_FALLBACK_BASE_URL: https://cherry-asparagus-a32jleuk8dgn22zu.salad.cloud/auth

      - name: Preserve custom domain
        run: echo "smyst.com" > dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
