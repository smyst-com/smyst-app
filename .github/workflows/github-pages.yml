name: GitHub Pages Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_CANONICAL_HOST: https://smyst.com
          VITE_API_BASE_URL: https://cherry-asparagus-a32jleuk8dgn22zu.salad.cloud
          VITE_API_FALLBACK_BASE_URL: https://api.smyst.com
          VITE_AUTH_BASE_URL: https://cherry-asparagus-a32jleuk8dgn22zu.salad.cloud/auth
          VITE_AUTH_FALLBACK_BASE_URL: https://api.smyst.com/auth

      - name: Preserve custom domain
        run: echo "smyst.com" > dist/CNAME

      - name: Add SPA fallback for deep links
        run: cp dist/index.html dist/404.html

      - name: Prerender legal routes with real 200 status
        run: |
          for route in privacy imprint terms trust; do
            mkdir -p "dist/$route"
            cp dist/index.html "dist/$route/index.html"
          done

      - name: Redirect German legal aliases
        run: |
          for pair in impressum:imprint datenschutz:privacy agb:terms; do
            src="${pair%%:*}"
            dst="${pair##*:}"
            mkdir -p "dist/$src"
            printf '<!doctype html><html lang="de"><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=/%s/"><link rel="canonical" href="https://smyst.com/%s/"><meta name="robots" content="noindex"><title>smyst.com</title><script>location.replace("/%s/")</script></head><body></body></html>' "$dst" "$dst" "$dst" > "dist/$src/index.html"
          done

      - name: Prerender public profile pages
        run: node scripts/generate-profile-pages.mjs
        env:
          VITE_CANONICAL_HOST: https://smyst.com

      # Autopilot-Pipeline: menschlich freigegebene Profile aus IDrive e2 laden.
      # Fehlt der Index (noch nichts publiziert), ist das ein No-op.
      - name: Fetch published pipeline profiles (optional)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
        run: |
          aws s3 cp s3://smyst-memories/pipeline/published/index.json pipeline-published-index.json \
            --endpoint-url https://s3.us-west-2.idrivee2.com --region us-west-2 \
            || echo "Kein Publish-Index in IDrive e2 (ok) — Site bleibt unveraendert."

      - name: Merge published pipeline profiles
        run: node scripts/merge-pipeline-published.mjs
        env:
          VITE_CANONICAL_HOST: https://smyst.com

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
          include-hidden-files: true

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
