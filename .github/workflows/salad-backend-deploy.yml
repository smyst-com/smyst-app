name: Salad Backend Deploy

# Deployt das FastAPI-Backend (backend/) auf SaladCloud — komplett auf GitHubs
# Servern, ohne lokales Docker/Node. Du brauchst nur:
#   1) 3 neue Repo-Secrets (Settings -> Secrets and variables -> Actions):
#        SALAD_API_KEY                 (Salad -> API Access)
#        GOOGLE_OAUTH_CLIENT_SECRET    (Google Cloud Console, neues Secret)
#        AUTH_SESSION_SECRET           (>= 32 Byte Zufall, z. B. `openssl rand -base64 48`)
#      (IDRIVE_E2_ACCESS_KEY / IDRIVE_E2_SECRET_KEY sind bereits gesetzt.)
#   2) Actions -> "Salad Backend Deploy" -> Run workflow -> approval = "Ja OK".
#
# Das GHCR-Image wird gepusht; mache das Package danach einmalig "public"
# (Repo -> Packages -> smyst-backend -> Package settings -> Change visibility),
# damit Salad es ziehen kann. Alternativ Secret GHCR_PULL_TOKEN (PAT mit read:packages) setzen.

on:
  workflow_dispatch:
    inputs:
      approval:
        description: 'Deploy freigeben. Exakt "Ja OK" eintragen.'
        required: true
        type: string

concurrency:
  group: salad-backend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, push and deploy backend to Salad
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/smyst-backend:latest
    steps:
      - name: Validate approval and secrets
        env:
          APPROVAL: ${{ inputs.approval }}
          SALAD_API_KEY: ${{ secrets.SALAD_API_KEY }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
        run: |
          test "$APPROVAL" = "Ja OK" || { echo "approval must be exactly 'Ja OK'"; exit 1; }
          test -n "$SALAD_API_KEY" || { echo "missing secret SALAD_API_KEY"; exit 1; }
          test -n "$GOOGLE_OAUTH_CLIENT_SECRET" || { echo "missing secret GOOGLE_OAUTH_CLIENT_SECRET"; exit 1; }
          test -n "$AUTH_SESSION_SECRET" || { echo "missing secret AUTH_SESSION_SECRET"; exit 1; }

      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ env.IMAGE }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create/update Salad container group
        run: node scripts/deploy-salad-backend.mjs --skip-build
        env:
          IMAGE: ${{ env.IMAGE }}
          SALAD_API_KEY: ${{ secrets.SALAD_API_KEY }}
          SALAD_ORGANIZATION_NAME: smyst-com
          SALAD_PROJECT_NAME: default
          SALAD_CONTAINER_GROUP: smyst-backend-api
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
          IDRIVE_E2_ACCESS_KEY: ${{ secrets.IDRIVE_E2_ACCESS_KEY }}
          IDRIVE_E2_SECRET_KEY: ${{ secrets.IDRIVE_E2_SECRET_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          LLM_PROVIDER_ORDER: ${{ secrets.LLM_PROVIDER_ORDER }}
          LLM_DEFAULT_MODELS: ${{ secrets.LLM_DEFAULT_MODELS }}
          # Falls GHCR-Package privat bleibt: PAT mit read:packages als GHCR_PULL_TOKEN setzen.
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GHCR_PULL_TOKEN }}
