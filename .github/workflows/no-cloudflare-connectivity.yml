name: No Cloudflare Connectivity Check

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "Public PWA URL"
        required: true
        default: "https://smyst.com"
        type: string
      api_live_url:
        description: "Salad FastAPI live health URL"
        required: true
        default: "https://api.smyst.com/api/v1/health/live"
        type: string
      api_ready_url:
        description: "Salad FastAPI ready health URL"
        required: true
        default: "https://api.smyst.com/api/v1/health/ready"
        type: string

jobs:
  check:
    name: Check web, API and Cloudflare absence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check endpoints
        env:
          WEB_URL: ${{ inputs.web_url }}
          API_LIVE_URL: ${{ inputs.api_live_url }}
          API_READY_URL: ${{ inputs.api_ready_url }}
        run: |
          set -eu
          check() {
            label="$1"
            url="$2"
            echo "::group::$label $url"
            headers="$(mktemp)"
            body="$(mktemp)"
            code="$(curl -sS -D "$headers" -o "$body" -w "%{http_code}" "$url")"
            cat "$headers"
            cat "$body"
            echo
            test "$code" -ge 200
            test "$code" -lt 500
            if grep -qi '^cf-ray:' "$headers"; then
              echo "warning: Cloudflare header present on $url; if this is the Salad endpoint, it can be provider-side rather than the Smyst Cloudflare account."
            fi
            echo "::endgroup::"
          }
          check "web" "$WEB_URL"
          check "api-live" "$API_LIVE_URL"
          check "api-ready" "$API_READY_URL"
