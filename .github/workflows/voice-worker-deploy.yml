name: Voice Worker Deploy

# Deployt den Klon-Stimmen-GPU-Worker (voice-worker/) auf SaladCloud.
# Erzeugt laufende GPU-Kosten (Option A, Freigabe Adam King 05.07.2026).
# Stoppen: Salad-Portal -> smyst-voice-worker -> Stop (Backend faellt
# automatisch auf Piper/Phase 1 zurueck).

on:
  workflow_dispatch:
    inputs:
      approval:
        description: 'Deploy freigeben. Exakt "Ja OK" eintragen.'
        required: true
        type: string

concurrency:
  group: voice-worker-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, push and deploy voice worker to Salad
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/smyst-voice-worker:${{ github.sha }}
    steps:
      - name: Validate approval and secrets
        env:
          APPROVAL: ${{ inputs.approval }}
          SALAD_API_KEY: ${{ secrets.SALAD_API_KEY }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
        run: |
          test "$APPROVAL" = "Ja OK" || { echo "approval must be exactly 'Ja OK'"; exit 1; }
          test -n "$SALAD_API_KEY" || { echo "missing secret SALAD_API_KEY"; exit 1; }
          test -n "$AUTH_SESSION_SECRET" || { echo "missing secret AUTH_SESSION_SECRET"; exit 1; }

      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push voice worker image
        uses: docker/build-push-action@v6
        with:
          context: voice-worker
          push: true
          tags: ${{ env.IMAGE }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Derive worker token (deterministisch, nie geloggt)
        env:
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
        run: |
          TOKEN=$(printf '%s' "voice-worker:$AUTH_SESSION_SECRET" | sha256sum | head -c 48)
          echo "::add-mask::$TOKEN"
          echo "WORKER_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Create/update Salad voice worker group
        run: node scripts/deploy-salad-voice-worker.mjs
        env:
          IMAGE: ${{ env.IMAGE }}
          SALAD_API_KEY: ${{ secrets.SALAD_API_KEY }}
          SALAD_ORGANIZATION_NAME: smyst-com
          SALAD_PROJECT_NAME: default
          SALAD_CONTAINER_GROUP: smyst-voice-worker
          WORKER_TOKEN: ${{ env.WORKER_TOKEN }}
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GHCR_PULL_TOKEN }}
