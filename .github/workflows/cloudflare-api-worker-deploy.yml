name: Cloudflare API Worker Deploy

on:
  workflow_dispatch:
    inputs:
      approval:
        description: 'Production-Freigabe. Exakt "Ja OK" eintragen.'
        required: true
        type: string

concurrency:
  group: cloudflare-api-worker-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-api-worker:
    name: Deploy smyst-api Worker
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Validate approval and secrets
        env:
          APPROVAL: ${{ inputs.approval }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test "$APPROVAL" = "Ja OK"
          test -n "$CLOUDFLARE_API_TOKEN"

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy smyst-api with LLM secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          AUTH_HMAC_SECRET: ${{ secrets.AUTH_HMAC_SECRET }}
          SALAD_API_BASE_URL: ${{ secrets.SALAD_API_BASE_URL }}
          SALAD_ORGANIZATION_NAME: ${{ secrets.SALAD_ORGANIZATION_NAME }}
          SALAD_PROJECT_NAME: ${{ secrets.SALAD_PROJECT_NAME }}
          SALAD_CONTAINER_GROUP: ${{ secrets.SALAD_CONTAINER_GROUP }}
          SALAD_API_KEY: ${{ secrets.SALAD_API_KEY }}
          SMYST_COMPUTE_CALLBACK_SECRET: ${{ secrets.SMYST_COMPUTE_CALLBACK_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const names = [
            'AUTH_HMAC_SECRET',
            'SALAD_API_BASE_URL',
            'SALAD_ORGANIZATION_NAME',
            'SALAD_PROJECT_NAME',
            'SALAD_CONTAINER_GROUP',
            'SALAD_API_KEY',
            'SMYST_COMPUTE_CALLBACK_SECRET',
            'OPENROUTER_API_KEY',
            'GROQ_API_KEY',
            'GEMINI_API_KEY',
            'ANTHROPIC_API_KEY',
            'XAI_API_KEY',
            'DEEPSEEK_API_KEY',
            'MOONSHOT_API_KEY',
            'MISTRAL_API_KEY',
            'OPENAI_API_KEY',
            'OPENAI_BASE_URL',
          ];
          const secrets = {};
          for (const name of names) {
            const value = process.env[name];
            if (value) secrets[name] = value;
          }
          fs.writeFileSync('/tmp/smyst_worker_secrets.json', JSON.stringify(secrets), { mode: 0o600 });
          fs.writeFileSync('/tmp/smyst_cf_token', process.env.CLOUDFLARE_API_TOKEN || '', { mode: 0o600 });
          NODE
          SMYST_WORKER_DEPLOY_FILTER=smyst-api \
          SMYST_CF_TOKEN_FILE=/tmp/smyst_cf_token \
          SMYST_WORKER_SECRETS_FILE=/tmp/smyst_worker_secrets.json \
          node scripts/deploy-cloudflare-workers-api.mjs
