name: E2E And Deployment Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-deployment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  free-only-validation:
    name: Free-only validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate active production files
        run: python3 scripts/validate-foundation.py

  pages-build:
    name: Cloudflare Pages build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint:tsc

      - name: Build
        run: npm run build

      - name: Validate Cloudflare Pages artifact
        run: sh scripts/check-dist-artifact.sh
