name: E2E And Deployment Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-deployment-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  free-only-validation:
    name: Free-only validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Validate active production files
        run: python3 scripts/validate-foundation.py

      - name: Validate profile memory contract
        run: python3 scripts/check-profile-memory-contract.py

  pages-build:
    name: Cloudflare Pages build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint:tsc

      - name: Build
        run: npm run build

      - name: Validate Cloudflare Pages artifact
        run: sh scripts/check-dist-artifact.sh

  browser-e2e:
    name: Current UI browser E2E
    needs: pages-build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Build root app
        run: npm run build

      - name: Start local Vite preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/smyst-vite-preview.log 2>&1 &
          echo $! > /tmp/smyst-vite-preview.pid
          sleep 5

      - name: Install browser test dependencies
        working-directory: frontend
        run: npm install

      - name: Install Chromium
        working-directory: frontend
        run: npx playwright install chromium

      - name: Run current app browser E2E
        working-directory: frontend
        env:
          WEB_BASE_URL: http://127.0.0.1:4173
        run: npx playwright test --project=chromium
